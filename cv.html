<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14; --surface: #13161e; --border: #1e2230;
      --accent: #c8f135; --accent2: #3af0c8; --text: #e8eaf0; --muted: #5a6070;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; padding: 36px 56px;
      display: flex; flex-direction: column;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .page-header { margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; }
    .header-left .label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 1px; }
    .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--accent); color: #0d0f14;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }

    .pdf-wrapper {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .pdf-wrapper embed {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="header-left">
      <div class="label">Document</div>
      <h1>Curriculum Vitæ</h1>
      <p class="sub">Eldjarn Fridriksson · L3 STAPS Management du sport</p>
    </div>
    <a class="btn" href="cv_eldjarn_fridriksson.pdf" download>⬇ Télécharger le PDF</a>
  </div>

  <div class="pdf-wrapper">
    <embed src="cv_eldjarn_fridriksson.pdf" type="application/pdf" width="100%" height="100%"/>
  </div>

</body>
</html>
