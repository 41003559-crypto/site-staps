<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio STAPS – Eldjarn Fridriksson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --border: #1e2230;
      --accent: #c8f135;
      --accent2: #3af0c8;
      --text: #e8eaf0;
      --muted: #5a6070;
      --nav-w: 270px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    nav {
      width: var(--nav-w);
      min-width: var(--nav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0 0 24px;
      overflow-y: auto;
    }
    .brand { padding: 32px 24px 24px; border-bottom: 1px solid var(--border); }
    .brand-tag { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; line-height: 1.1; letter-spacing: 1px; }
    .brand-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .nav-section { padding: 20px 16px 8px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    .nav-links { list-style: none; padding: 0 12px; flex: 1; }
    .nav-links li { margin-bottom: 4px; }
    .nav-links a {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px;
      text-decoration: none; color: var(--muted);
      font-size: 13.5px; font-weight: 400;
      transition: all 0.18s ease; border: 1px solid transparent;
    }
    .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-links a.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 500; }
    .nav-links a .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-footer { padding: 16px 24px 0; border-top: 1px solid var(--border); margin-top: auto; font-size: 11px; color: var(--muted); }
    .status-dot { display: inline-block; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 52px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 16px; background: var(--surface); }
    .breadcrumb { font-size: 12px; color: var(--muted); }
    .breadcrumb span { color: var(--text); font-weight: 500; }
    .topbar-badge { margin-left: auto; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); border: 1px solid var(--accent2); border-radius: 4px; padding: 2px 8px; }
    iframe#content { flex: 1; border: none; width: 100%; background: var(--bg); }
  </style>
</head>
<body>
  <nav>
    <div class="brand">
      <div class="brand-tag">Portfolio</div>
      <div class="brand-name">Eldjarn Fridriksson</div>
      <div class="brand-sub">L3 STAPS · Management du sport · Paris-Nanterre</div>
    </div>
    <div class="nav-section">Navigation</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="#" class="active" onclick="loadPage('presentation.html', this, 'Présentation')"><span class="icon">👤</span> Présentation</a></li>
      <li><a href="#" onclick="loadPage('cv.html', this, 'Curriculum Vitae')"><span class="icon">📄</span> CV en PDF</a></li>
      <li><a href="#" onclick="loadPage('linkedin.html', this, 'LinkedIn')"><span class="icon">🔗</span> LinkedIn</a></li>
      <li><a href="#" onclick="loadPage('formations.html', this, 'Formations après L3')"><span class="icon">🎓</span> Formations après L3</a></li>
      <li><a href="#" onclick="loadPage('debouches.html', this, 'Débouchés')"><span class="icon">🏆</span> Débouchés souhaités</a></li>
    </ul>
    <div class="nav-footer"><span class="status-dot"></span>Site en ligne · 2025</div>
  </nav>
  <main>
    <div class="topbar">
      <div class="breadcrumb">Portfolio / <span id="pageTitle">Présentation</span></div>
      <div class="topbar-badge">L3 STAPS</div>
    </div>
    <iframe id="content" src="presentation.html" title="Contenu principal"></iframe>
  </main>
  <script>
    function loadPage(url, el, title) {
      event.preventDefault();
      document.getElementById('content').src = url;
      document.getElementById('pageTitle').textContent = title;
      document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
